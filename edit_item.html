{% extends "base.html" %}
{% block title %}Edit Item{% endblock %}
{% block content %}
<h3>Edit Item</h3>
<div class="card p-3">
  <form method="POST">
    <div class="row g-2">
      <div class="col-md-4"><input class="form-control" name="name" value="{{ item['name'] }}" required></div>
      <div class="col-md-2"><input class="form-control" name="category" value="{{ item['category'] }}" required></div>
      <div class="col-md-1"><input class="form-control" name="quantity" type="number" value="{{ item['quantity'] }}" min="0" required></div>
      <div class="col-md-1"><input class="form-control" name="unit" value="{{ item['unit'] }}"></div>
      <div class="col-md-2">
        <select class="form-select" name="supplier_id">
          <option value="">No supplier</option>
          {% for s in suppliers %}
            <option value="{{ s['id'] }}" {% if item['supplier_id'] == s['id'] %}selected{% endif %}>{{ s['name'] }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-1"><input class="form-control" name="price" type="number" step="0.01" value="{{ item['price'] }}"></div>
      <div class="col-md-2"><input class="form-control" name="expiry_date" type="date" value="{{ item['expiry_date'] }}"></div>
      <div class="col-md-1"><input class="form-control" name="reorder_level" type="number" value="{{ item['reorder_level'] }}"></div>
    </div>
    <div class="mt-3 text-end">
      <button class="btn btn-success">Save</button>
      <a class="btn btn-secondary" href="{{ url_for('inventory') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
